<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 독서기록소</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .signup-container { max-width: 450px; margin: 80px auto; padding: 30px; }
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 10px; top: 38px; cursor: pointer; color: #666; }
    </style>
</head>
<body class="bg-light">
<div class="signup-container bg-white shadow rounded">
    <h2 class="text-center fw-bold mb-4">회원가입</h2>
    <form th:action="@{/signup}" method="post">
        <div class="mb-3">
            <label class="form-label">아이디 (Username)</label>
            <input type="text" name="username" class="form-control" placeholder="아이디 입력해라 이말이야" required>
        </div>
        <div class="mb-3">
            <label class="form-label">이메일 (Email)</label>
            <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
        </div>
        <div class="mb-3 password-wrapper">
            <label class="form-label">비밀번호</label>
            <input type="password" id="password" name="password" class="form-control"
                   pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$"
                   title="영문, 숫자, 특수문자 조합 8자 이상 입력해라 유남생?!?" required>
            <i class="fa-solid fa-eye toggle-password" id="eye-icon"></i>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold mt-3">이메일 인증 전송</button>
    </form>
    <div class="text-center mt-3">
        <a href="/login" class="text-muted small">이미 계정이 있냐?!? 로그인해라 이말이야</a>
    </div>
</div>

<script>
    // 👁️ 눈 아이콘 클릭 시 비번 보이기/숨기기 로직이지 이말이여!
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eye-icon');

    eyeIcon.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        eyeIcon.classList.toggle('fa-eye-slash');
    });
</script>
</body>
</html>
