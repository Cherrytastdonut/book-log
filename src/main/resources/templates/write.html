<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>독서 기록하기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2>새로운 독서 기록</h2>
<hr>
<form action="/write" method="post" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label">책 제목</label>
        <input type="text" name="title" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">메인 사진 (목록용)</label>
        <input type="file" name="mainImg" class="form-control" accept="image/*" required>
    </div>
    <div class="mb-3">
        <label class="form-label">본문 내용</label>
        <textarea name="content" class="form-control" rows="5"></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">인상 깊은 사진들 (여러 장 가능)</label>
        <input type="file" name="subImgs" class="form-control" accept="image/*" multiple>
    </div>
    <button type="submit" class="btn btn-success">기록 저장</button>
</form>
</body>
</html>
