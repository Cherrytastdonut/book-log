<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>기록 수정하기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .edit-container { max-width: 700px; margin: 0 auto; padding: 40px; }
        .edit-img-thumbnail { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; margin-right: 10px; }
        .img-delete-box { display: inline-block; position: relative; margin-bottom: 15px; }

        /* X 버튼 위치랑 정렬 쫀득하게 수정했다 이말이야! */
        .btn-delete {
            position: absolute; top: -5px; right: 5px;
            background: rgba(255,0,0,0.8); color: white;
            border: none; border-radius: 50%;
            width: 22px; height: 22px;
            font-size: 14px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; /* 글자 중앙 정렬! */
            cursor: pointer; padding-bottom: 2px;
        }
        /* 체크박스 선택 시 시각적 효과 (선택사항) */
        input[type="checkbox"]:checked + .btn-delete {
            background: #000;
            border: 2px solid white;
        }
    </style>
</head>
<body class="bg-light">
<div class="edit-container bg-white shadow-sm mt-5 mb-5">
    <h2 class="text-center fw-bold mb-4">독서 기록 수정</h2>
    <hr>

    <form th:action="@{/edit/{id}(id=${book.id})}" method="post" enctype="multipart/form-data" id="editForm">
        <div class="mb-3">
            <label class="form-label fw-bold">책 제목</label>
            <input type="text" name="title" class="form-control" th:value="${book.title}" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">본문 내용</label>
            <textarea name="content" class="form-control" rows="10" th:text="${book.content}" required></textarea>
        </div>

        <div class="mb-3 border-top pt-3">
            <label class="form-label fw-bold">메인 사진 수정 (교체하려면 파일 선택)</label>
            <div>
                <img th:src="${book.mainImageUrl}" class="edit-img-thumbnail mb-2">
            </div>
            <input type="file" name="mainImg" class="form-control" accept="image/*">
        </div>

        <div class="mb-3 border-top pt-3">
            <label class="form-label fw-bold mb-2">인상 깊은 사진들 관리</label>
            <div>
                <div th:each="imgUrl : ${book.subImageUrls}" class="img-delete-box">
                    <img th:src="${imgUrl}" class="edit-img-thumbnail">
                    <input type="checkbox" name="deleteImgs" th:value="${imgUrl}"
                           th:id="|check_${imgUrl}|" style="display: none;">
                    <label th:for="|check_${imgUrl}|" class="btn-delete" title="사진 삭제">X</label>
                </div>
            </div>

            <label class="form-label fw-bold mt-2">새로운 사진 추가 (여러 장 가능)</label>
            <input type="file" name="subImgs" class="form-control" accept="image/*" multiple>
        </div>

        <div class="alert alert-info">
            💡 사진 위 'X'를 누르면 검게 변하고, 저장 시 삭제된다 이말이야! <br>
            날짜(<span th:text="${#temporals.format(book.createdAt, 'yyyy-MM-dd')}"></span>)는 유지된다 이말이야 유남생?!?
        </div>

        <div class="d-flex justify-content-between mt-4 border-top pt-4">
            <div>
                <a th:href="@{/view/{id}(id=${book.id})}" class="btn btn-outline-secondary">취소</a>
            </div>
            <div>
                <button type="button" class="btn btn-danger me-2" th:onclick="|deleteBoard(${book.id})|">게시글 삭제</button>
                <button type="submit" class="btn btn-warning px-5 fw-bold">수정 완료</button>
            </div>
        </div>
    </form>
</div>

<form id="deleteForm" method="post" style="display:none;"></form>

<script th:inline="javascript">
    function deleteBoard(id) {
        if (confirm("진짜로 이 기록을 쌈뽕하게 날려버릴 거냐?!? 복구 안 된다 이말이야!")) {
            const form = document.getElementById('deleteForm');
            form.action = '/delete/' + id;
            form.submit();
        }
    }
</script>

</body>
</html>
