<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 나만의 독서기록소</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 💥 회원가입 페이지와 동일한 그라데이션으로 통일감을 준다 이말이야! */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-container {
            max-width: 400px;
            width: 90%;
        }
    </style>
</head>
<body>


<div class="container login-container bg-white p-5 shadow-lg rounded-4">
    <h3 class="text-center mb-4 fw-bold text-primary">📚 로그인하라 브@로!</h3>

    <div th:if="${param.error}" class="alert alert-danger p-2 small text-center">
        아이디@나 비번@이 삑@사리 났다 이말이야 유남생?!?
    </div>

    <div th:if="${param.success}" class="alert alert-success p-2 small text-center">
        회원가입@ 쫀득@하게 성공했다! 로그인 드가자!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">아이디</label>
            <input type="text" name="username" id="username" class="form-control"
                   autocomplete="off" required placeholder="아이디 입력해라 이말이야">
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">비밀번호</label>
            <input type="password" name="password" id="password" class="form-control"
                   autocomplete="new-password" required placeholder="비번 입력해라 유남생?!?">
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold py-3 mt-2 shadow">
            로그인 드가자!
        </button>
    </form>

    <div class="text-center mt-4">
        <a href="/signup" class="text-muted small" style="text-decoration: none;">
            아직 회원이 아니냐?!? <br> 쫀득하게 <span class="text-primary fw-bold">가입해라 브@로!</span>
        </a>
    </div>
</div>

<script>
    // 💥 페이지 로드 시 무조건 입력창 비워버리기!
    window.onload = function() {
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    };
</script>
</body>
</html>
