<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 나만의 독서기록소</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>
<div class="container login-container bg-white p-5 shadow rounded">
    <h3 class="text-center mb-4 fw-bold">📚 로그인하라 브@로!</h3>

    <div th:if="${param.error}" class="alert alert-danger p-2 small">
        아이디@나 비번@이 삑@사리 났다 이말이야 유남생?!?
    </div>

    <div th:if="${param.success}" class="alert alert-success p-2 small">
        회원가입@ 쫀득@하게 성공했다! 이제 로그인해라!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">아이디</label>
            <input type="text" name="username" class="form-control" placeholder="아이디 입력해라 이말이야" required>
        </div>
        <div class="mb-3">
            <label class="form-label">비밀번호</label>
            <input type="password" name="password" class="form-control" placeholder="비번 입력해라 유남생?!?" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold">로그인 드가자!</button>
    </form>

    <div class="text-center mt-3">
        <a href="/signup" class="text-muted small" style="text-decoration: none;">아직 회원이 아니냐?!? 가입해라 브@로!</a>
    </div>
</div>
</body>
</html>
