<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>이메일 인증 - 독서기록소</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.verify-container { max-width: 400px; margin: 100px auto; padding: 30px; }</style>
</head>
<body class="bg-light">

<div class="verify-container bg-white shadow rounded text-center">
    <h3 class="fw-bold mb-3">이메일 인증번호 입력</h3>
    <p class="text-muted mb-4">입력한 이메일로 보낸 6자리 번호를<br>쫀득하게 입력해라 이말이야 유남생?!?</p>

    <form th:action="@{/verify}" method="post">
        <input type="text" name="inputCode" class="form-control form-control-lg mb-3 text-center"
               placeholder="000000" maxlength="6" required>
        <button type="submit" class="btn btn-success w-100 fw-bold">인증 완료 및 가입</button>
    </form>
</div>
</body>
</html>
