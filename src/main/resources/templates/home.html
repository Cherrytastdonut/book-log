<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>나만의 독서기록소</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .book-img { width: 100px; height: 140px; object-fit: cover; }
        .record-item { border-bottom: 1px solid #dee2e6; padding: 15px 0; }
    </style>
</head>
<body class="container mt-5">
<h1 class="text-center">나만의 독서기록소</h1>
<hr>

<div class="d-flex justify-content-between mb-4 align-items-center">
    <div class="dropdown">
        <button class="btn btn-outline-dark dropdown-toggle" type="button" id="sortDropdown" data-bs-toggle="dropdown" aria-expanded="false">
            <span th:if="${param.sort == null or #strings.equals(param.sort, 'latest')}">최신순</span>
            <span th:if="${#strings.equals(param.sort, 'oldest')}">오래된순</span>
            <span th:if="${#strings.equals(param.sort, 'views')}">조회수순</span>
            정렬 방식
        </button>

        <ul class="dropdown-menu shadow" aria-labelledby="sortDropdown">
            <li><a class="dropdown-item" href="/?sort=latest">
                최신순 <span th:if="${param.sort == null or #strings.equals(param.sort, 'latest')}" class="float-end text-primary">✔</span>
            </a></li>
            <li><a class="dropdown-item" href="/?sort=oldest">
                오래된순 <span th:if="${#strings.equals(param.sort, 'oldest')}" class="float-end text-primary">✔</span>
            </a></li>
            <li><hr class="dropdown-divider"></li> <li><a class="dropdown-item" href="/?sort=views">
            조회수순 <span th:if="${#strings.equals(param.sort, 'views')}" class="float-end text-primary">✔</span>
        </a></li>
        </ul>
    </div>

    <a href="/write" class="btn btn-primary fw-bold px-4">기록하기</a>
</div>

<div th:each="book : ${books}" class="record-item d-flex align-items-center">
    <a th:href="@{/view/{id}(id=${book.id})}">
        <img th:src="${book.mainImageUrl}" class="book-img me-4" alt="book-img">
    </a>

    <div>
        <a th:href="@{/view/{id}(id=${book.id})}" style="text-decoration: none; color: inherit;">
            <h4 th:text="${book.title}" class="mb-1">책 제목이지 이말이야</h4>
        </a>
        <p class="text-muted mb-1" th:text="${#temporals.format(book.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</p>
        <span class="badge bg-info" th:text="'조회수: ' + ${book.viewCount}">0</span>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
</html>
