<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>나만의 독서기록소</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 헤더 길이를 쭉 늘리기 위해 container-fluid와 조합한다 이말이야! */
        .navbar { border-bottom: 1px solid #ddd; }
        .book-img { width: 100px; height: 140px; object-fit: cover; border-radius: 4px; }
        .record-item { border-bottom: 1px solid #dee2e6; padding: 15px 0; }
        .main-content { max-width: 900px; margin: 0 auto; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container-fluid px-5">
        <a class="navbar-brand fw-bold" href="/">나만의 독서기록소</a>
        <div class="ms-auto d-flex align-items-center">
            <div sec:authorize="isAnonymous()">
                <a href="/login" class="btn btn-outline-light btn-sm me-2">로그인</a>
                <a href="/signup" class="btn btn-primary btn-sm">회원가입</a>
            </div>
            <div sec:authorize="isAuthenticated()">
                <span class="text-white me-3">
                    <strong th:text="${#authentication.name}" class="text-warning">브로</strong>님 환영한다 이말이야!
                </span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-danger">로그아웃</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container main-content bg-white p-4 shadow-sm rounded">
    <div class="d-flex justify-content-between mb-4 align-items-center">
        <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle btn-sm fw-bold" type="button" data-bs-toggle="dropdown">
                <span th:text="${currentSort == 'views' ? '조회수순' : (currentSort == 'oldest' ? '오래된순' : '최신순')}">정렬 기준</span>
            </button>
            <ul class="dropdown-menu shadow">
                <li><a class="dropdown-item p-2 small" th:href="@{/(sort='latest')}">최신순 드가자!</a></li>
                <li><a class="dropdown-item p-2 small" th:href="@{/(sort='oldest')}">오래된순 쫀득하게!</a></li>
                <li><a class="dropdown-item p-2 small" th:href="@{/(sort='views')}">조회수순 찰지게!</a></li>
            </ul>
        </div>

        <div sec:authorize="isAnonymous()">
            <a href="javascript:void(0);"
               onclick="if(confirm('로그인@부터 하고 와라 브@로! 로그인 페이지로 갈래?!?')) location.href='/login';"
               class="btn btn-primary fw-bold px-4">기록하기</a>
        </div>

        <div sec:authorize="isAuthenticated()">
            <a href="/write" class="btn btn-primary fw-bold px-4">기록하기</a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(books)}" class="text-center py-5">
        <p class="text-muted">아직 기록이 없다 이말이야! 첫 글을 쫀득하게 써봐라 유남생?!?</p>
    </div>

    <div th:each="book : ${books}" class="record-item d-flex align-items-center">
        <a th:href="@{/view/{id}(id=${book.id})}">
            <img th:src="${book.mainImageUrl}" class="book-img me-4" alt="book-img">
        </a>
        <div>
            <a th:href="@{/view/{id}(id=${book.id})}" style="text-decoration: none; color: inherit;">
                <h4 th:text="${book.title}" class="mb-1 fw-bold">책 제목이지 이말이야</h4>
            </a>
            <p class="text-muted mb-1 small" th:text="${#temporals.format(book.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</p>
            <span class="badge bg-info text-dark" th:text="'조회수: ' + ${book.viewCount}">0</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
